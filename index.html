<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weight Tracker Widget</title>
<style>
  :root {
    --gold: #ffc02e;
    --gold-deep: #f5a623;
    --pink: #ff3d7f;
    --bg: #0a0a0a;
    --card: #000000;
    --gray: #8a8a8a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .card {
    width: 420px;
    max-width: 92vw;
    background: radial-gradient(120% 120% at 50% 0%, #0d0d0d 0%, #000 60%);
    border-radius: 36px;
    padding: 32px 28px 24px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 20px 60px rgba(0,0,0,0.6);
    color: #fff;
  }

  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .side {
    flex: 0 0 92px;
    text-align: center;
  }

  .side .icon-wrap {
    width: 62px;
    height: 62px;
    margin: 0 auto 14px;
    border-radius: 16px;
    border: 1.5px solid var(--pink);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 10px rgba(255, 61, 127, 0.55), inset 0 0 8px rgba(255, 61, 127, 0.25);
  }

  .side .icon-wrap svg {
    width: 34px;
    height: 34px;
    filter: drop-shadow(0 0 4px rgba(255, 61, 127, 0.7));
  }

  .side .big {
    font-size: 34px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }

  .side .unit {
    font-size: 15px;
    color: var(--gray);
    font-weight: 600;
    margin-bottom: 2px;
  }

  .side .accent {
    font-size: 14px;
    color: var(--pink);
    font-weight: 600;
  }

  .side .plain {
    font-size: 14px;
    color: #fff;
    font-weight: 600;
  }

  .ring-col {
    flex: 1;
    display: flex;
    justify-content: center;
  }

  .ring-wrap {
    position: relative;
    width: 200px;
    height: 200px;
  }

  .ring-wrap svg { transform: rotate(-90deg); }

  .ring-track {
    fill: none;
    stroke: #1c1c1c;
    stroke-width: 18;
  }

  .ring-progress {
    fill: none;
    stroke: url(#goldGradient);
    stroke-width: 18;
    stroke-linecap: round;
    filter: drop-shadow(0 0 10px rgba(255, 192, 46, 0.9)) drop-shadow(0 0 22px rgba(255, 176, 0, 0.55));
    transition: stroke-dasharray 0.8s ease;
  }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .crown {
    width: 30px;
    height: 30px;
    margin-bottom: 4px;
    filter: drop-shadow(0 0 6px rgba(255, 192, 46, 0.9));
  }

  .ring-center .weight {
    font-size: 40px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1px;
  }

  .ring-center .lbs {
    font-size: 16px;
    color: #eee;
    font-weight: 600;
    margin-top: 2px;
  }

  .ring-center .divider {
    width: 34px;
    height: 2px;
    background: var(--gold);
    margin: 6px 0;
    border-radius: 2px;
  }

  .ring-center .pct {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }

  .hr {
    height: 1px;
    background: rgba(255,255,255,0.14);
    margin: 26px 0 18px;
    border: none;
  }

  .bottom-row {
    display: flex;
    justify-content: space-between;
  }

  .stat {
    flex: 1;
    text-align: center;
    position: relative;
  }

  .stat + .stat::before {
    content: "";
    position: absolute;
    left: 0;
    top: 6px;
    bottom: 6px;
    width: 1px;
    background: rgba(255,255,255,0.14);
  }

  .stat .label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat .value {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .stat .unit {
    font-size: 13px;
    color: var(--gray);
    font-weight: 600;
    margin-top: 2px;
  }

  @media (max-width: 420px) {
    .card { padding: 24px 16px 18px; }
    .side { flex-basis: 76px; }
    .ring-wrap { width: 160px; height: 160px; }
    .ring-center .weight { font-size: 32px; }
  }
</style>
</head>
<body>

<div class="card" id="card">

  <div class="top-row">
    <div class="side">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--pink)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="16" rx="2.5"></rect>
          <path d="M3 10h18"></path>
          <path d="M8 3v4"></path>
          <path d="M16 3v4"></path>
          <circle cx="8" cy="14" r="1"></circle>
          <circle cx="12" cy="14" r="1"></circle>
          <circle cx="16" cy="14" r="1"></circle>
          <circle cx="8" cy="17.5" r="1"></circle>
          <circle cx="12" cy="17.5" r="1"></circle>
        </svg>
      </div>
      <div class="big" id="daysCount">20</div>
      <div class="unit">Days</div>
      <div class="accent">Since</div>
      <div class="plain" id="sinceDate">Jul 1</div>
    </div>

    <div class="ring-col">
      <div class="ring-wrap">
        <svg viewBox="0 0 200 200" width="200" height="200">
          <defs>
            <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffd25c"></stop>
              <stop offset="100%" stop-color="#ffa300"></stop>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="100" cy="100" r="82"></circle>
          <circle class="ring-progress" id="ringProgress" cx="100" cy="100" r="82"
            stroke-dasharray="515.2" stroke-dashoffset="257.6"></circle>
        </svg>
        <div class="ring-center">
          <svg class="crown" viewBox="0 0 24 24" fill="var(--gold)">
            <path d="M3 8l4 3 5-6 5 6 4-3-2 10H5L3 8z"></path>
            <circle cx="3" cy="7" r="1.4"></circle>
            <circle cx="12" cy="4" r="1.4"></circle>
            <circle cx="21" cy="7" r="1.4"></circle>
          </svg>
          <div class="weight"><span id="currentWeight">220.0</span></div>
          <div class="lbs">lbs</div>
          <div class="divider"></div>
          <div class="pct" id="pctLabel">50%</div>
        </div>
      </div>
    </div>

    <div class="side">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--pink)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"></rect>
          <path d="M6 15l4-4 3 3 5-6"></path>
          <path d="M14 7h4v4"></path>
        </svg>
      </div>
      <div class="big" id="lostAmount">30.0</div>
      <div class="unit">lbs</div>
      <div class="accent">lost so far</div>
    </div>
  </div>

  <hr class="hr" />

  <div class="bottom-row">
    <div class="stat">
      <div class="label">Starting</div>
      <div class="value" id="startingWeight">250.0</div>
      <div class="unit">lbs</div>
    </div>
    <div class="stat">
      <div class="label">Goal</div>
      <div class="value" id="goalWeight">160.0</div>
      <div class="unit">lbs</div>
    </div>
    <div class="stat">
      <div class="label">To Go</div>
      <div class="value" id="toGoWeight">45.0</div>
      <div class="unit">lbs</div>
    </div>
  </div>

</div>

<script>
  // ---- Configure your tracker here ----
  const config = {
    startDate: "2026-07-19", // "Since" date, ISO format
    startingWeight: 252.6,
    currentWeight: 174.2,
    goalWeight: 130.0,
  };
  // --------------------------------------

  function formatDate(iso) {
    const d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  }

  function daysSince(iso) {
    const start = new Date(iso + "T00:00:00");
    const now = new Date();
    const startUTC = Date.UTC(start.getFullYear(), start.getMonth(), start.getDate());
    const nowUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
    return Math.max(0, Math.round((nowUTC - startUTC) / 86400000));
  }

  function render(cfg) {
    const totalToLose = cfg.startingWeight - cfg.goalWeight;
    const lostSoFar = cfg.startingWeight - cfg.currentWeight;
    const toGo = cfg.currentWeight - cfg.goalWeight;
    const pct = totalToLose > 0 ? Math.min(100, Math.max(0, (lostSoFar / totalToLose) * 100)) : 0;

    document.getElementById("daysCount").textContent = daysSince(cfg.startDate);
    document.getElementById("sinceDate").textContent = formatDate(cfg.startDate);
    document.getElementById("currentWeight").textContent = cfg.currentWeight.toFixed(1);
    document.getElementById("pctLabel").textContent = Math.round(pct) + "%";
    document.getElementById("lostAmount").textContent = lostSoFar.toFixed(1);
    document.getElementById("startingWeight").textContent = cfg.startingWeight.toFixed(1);
    document.getElementById("goalWeight").textContent = cfg.goalWeight.toFixed(1);
    document.getElementById("toGoWeight").textContent = toGo.toFixed(1);

    const r = 82;
    const circumference = 2 * Math.PI * r;
    const offset = circumference * (1 - pct / 100);
    const ring = document.getElementById("ringProgress");
    ring.setAttribute("stroke-dasharray", circumference.toFixed(2));
    ring.setAttribute("stroke-dashoffset", offset.toFixed(2));
  }

  render(config);
</script>

</body>
</html>
