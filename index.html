<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Loss Progress</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="widget">
<div class="main-row">

    <!-- LEFT: Date -->
    <div class="date-section">

        <div class="calendar-icon">
            <span></span>
        </div>

        <div id="days" class="days"></div>

        <div id="start-date" class="start-date"></div>

    </div>


    <!-- CENTER: Ring -->
    <div class="ring">

        <div class="ring-content">

            <div class="crown">👑</div>

            <div id="weight" class="weight"></div>

            <div id="percent" class="percent"></div>

        </div>

    </div>


    <!-- RIGHT: Lost -->
    <div class="loss-section">

        <div class="graph-icon">
            <span></span>
        </div>

        <div id="lost" class="lost"></div>

        <div class="loss-label">
            lost so far
        </div>

    </div>

</div>


<!-- BOTTOM -->
<div class="goal-row">

    <div class="goal-item">
        <div class="goal-label">Starting</div>
        <div id="starting-weight" class="goal-number"></div>
    </div>


    <div class="goal-item">
        <div class="goal-label">Goal</div>
        <div id="goal-weight" class="goal-number"></div>
    </div>


    <div class="goal-item">
        <div class="goal-label">To Go</div>
        <div id="to-go" class="goal-number"></div>
    </div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
