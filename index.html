<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Loss Progress</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="widget">

<div class="ring">
    <svg viewBox="0 0 180 180">

        <circle
            class="circle-bg"
            cx="90"
            cy="90"
            r="80">
        </circle>

        <circle
            id="progress-ring"
            class="circle-progress"
            cx="90"
            cy="90"
            r="80">
        </circle>

    </svg>

<div class="ring-content">

    <div class="crown">👑</div>

    <div id="weight" class="ring-weight"></div>

    <div id="percent" class="ring-percent"></div>

</div>
</div>


   <div class="date-section">

    <div class="calendar-icon">🗓️</div>

    <div id="days" class="days"></div>

</div>

    <div id="lost" class="lost"></div>
    <div id="milestone" class="milestone"></div>

</div>

<script src="script.js"></script>

</body>
</html>
