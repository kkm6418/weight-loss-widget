<div class="widget">

    <!-- Top Section -->
    <div class="top-section">

        <!-- Calendar -->
        <div class="side-panel date-panel">

            <div class="calendar-icon">
                <span></span>
            </div>

            <div id="days" class="days"></div>

            <div id="start-date" class="start-date"></div>

        </div>

        <!-- Center Ring -->
        <div class="ring-panel">

            <div class="ring">

                <svg class="progress-ring" viewBox="0 0 200 200">

                    <circle
                        class="circle-bg"
                        cx="100"
                        cy="100"
                        r="78">
                    </circle>

                    <circle
                        id="circle-progress"
                        class="circle-progress"
                        cx="100"
                        cy="100"
                        r="78">
                    </circle>

                </svg>

                <div class="ring-content">

                    <div class="crown">👑</div>

                    <div id="weight" class="ring-weight"></div>

                    <div id="percent" class="ring-percent"></div>

                </div>

            </div>

        </div>

        <!-- Graph -->
        <div class="side-panel loss-panel">

            <div class="graph-icon">
                <span></span>
            </div>

            <div id="lost" class="lost"></div>

            <div class="loss-label">
                lost so far
            </div>

        </div>

    </div>

    <!-- Footer -->

    <div class="footer">

        <div class="footer-item">

            <div class="footer-label">Starting</div>

            <div id="starting-weight" class="footer-value"></div>

        </div>

        <div class="footer-item">

            <div class="footer-label">Goal</div>

            <div id="goal-weight" class="footer-value"></div>

        </div>

        <div class="footer-item">

            <div class="footer-label">To Go</div>

            <div id="to-go" class="footer-value"></div>

        </div>

    </div>

</div>
